# Template for hyperparameter search configuration file

baseline_params_path: null

hyperparameters:
  - name: lr
    type: range
    bounds: [0.000001, 0.001]
    log_scale: true

  - name: embedding_dim
    type: choice
    values: [256, 512, 1024, 2048]
    value_type: int

  - name: target_sz_z
    type: choice
    values: [4, 8, 16]
    value_type: int

  - name: target_sz_xy
    type: choice
    values: [16, 32, 64, 128]
    value_type: int


