# Template for hyperparameter search configuration file

baseline_params_path: null

hyperparameters:
  - name: lr
    type: range
    bounds: [0.000001, 0.001]
    log_scale: true

  - name: learning_rate_weights
    type: range
    bounds: [0.1, 10.0]
    log_scale: true

  - name: embedding_dim
    type: range
    bounds: [256, 2048]
    log_scale: true
    value_type: int

